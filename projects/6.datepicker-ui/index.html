<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Datepicker UI - Challenge</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <div class="datepickerInputWrapper isFocused">
                <svg
                    class="icon"
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M5.33301 1.33337V4.00004"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                    <path
                        d="M10.667 1.33337V4.00004"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                    <path
                        d="M12.6667 2.66663H3.33333C2.59695 2.66663 2 3.26358 2 3.99996V13.3333C2 14.0697 2.59695 14.6666 3.33333 14.6666H12.6667C13.403 14.6666 14 14.0697 14 13.3333V3.99996C14 3.26358 13.403 2.66663 12.6667 2.66663Z"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                    <path
                        d="M2 6.66663H14"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                </svg>

                <input
                    type="text"
                    class="realInput"
                    value="08/04/2026 - 13/04/2026"
                    readonly
                    spellcheck="false"
                />
            </div>

            <div class="datepickerContainer">
                <header class="calendarHeader">
                    <button class="navButton">
                        <svg
                            class="icon"
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M10 12L6 8L10 4"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>

                    <button class="monthSelector">
                        Abril 2026
                        <svg
                            class="icon"
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M4 6L8 10L12 6"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>

                    <button class="navButton">
                        <svg
                            class="icon"
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M6 12L10 8L6 4"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>
                </header>

                <div class="monthWrapper">
                    <div class="weekdaysGrid">
                        <span>D</span>
                        <span>S</span>
                        <span>T</span>
                        <span>Q</span>
                        <span>Q</span>
                        <span>S</span>
                        <span>S</span>
                    </div>
                    <div class="daysGrid">
                        <div class="dayWrapper isMuted"><button class="dayItem">29</button></div>
                        <div class="dayWrapper isMuted"><button class="dayItem">30</button></div>
                        <div class="dayWrapper isMuted"><button class="dayItem">31</button></div>
                        <div class="dayWrapper"><button class="dayItem">1</button></div>
                        <div class="dayWrapper"><button class="dayItem">2</button></div>
                        <div class="dayWrapper"><button class="dayItem">3</button></div>
                        <div class="dayWrapper"><button class="dayItem">4</button></div>
                        <div class="dayWrapper"><button class="dayItem">5</button></div>
                        <div class="dayWrapper"><button class="dayItem">6</button></div>
                        <div class="dayWrapper"><button class="dayItem">7</button></div>
                        <div class="dayWrapper isSelected isStart"><button class="dayItem">8</button></div>
                        <div class="dayWrapper isInRange"><button class="dayItem">9</button></div>
                        <div class="dayWrapper isInRange"><button class="dayItem">10</button></div>
                        <div class="dayWrapper isInRange"><button class="dayItem">11</button></div>
                        <div class="dayWrapper isInRange"><button class="dayItem">12</button></div>
                        <div class="dayWrapper isSelected isEnd"><button class="dayItem">13</button></div>
                        <div class="dayWrapper"><button class="dayItem">14</button></div>
                        <div class="dayWrapper"><button class="dayItem">15</button></div>
                        <div class="dayWrapper"><button class="dayItem">16</button></div>
                        <div class="dayWrapper"><button class="dayItem">17</button></div>
                        <div class="dayWrapper"><button class="dayItem">18</button></div>
                        <div class="dayWrapper"><button class="dayItem">19</button></div>
                        <div class="dayWrapper"><button class="dayItem">20</button></div>
                        <div class="dayWrapper"><button class="dayItem">21</button></div>
                        <div class="dayWrapper"><button class="dayItem">22</button></div>
                        <div class="dayWrapper"><button class="dayItem">23</button></div>
                        <div class="dayWrapper"><button class="dayItem">24</button></div>
                        <div class="dayWrapper"><button class="dayItem">25</button></div>
                        <div class="dayWrapper"><button class="dayItem">26</button></div>
                        <div class="dayWrapper"><button class="dayItem">27</button></div>
                        <div class="dayWrapper"><button class="dayItem">28</button></div>
                        <div class="dayWrapper"><button class="dayItem">29</button></div>
                        <div class="dayWrapper hasIndicator"><button class="dayItem">30</button></div>
                        <div class="dayWrapper isMuted"><button class="dayItem">1</button></div>
                        <div class="dayWrapper isMuted"><button class="dayItem">2</button></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
